[build]
  command = "npm run build"
  publish = "dist"

# IMPORTANT: replace this backend URL after your Vercel deployment is live.
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-VERCEL-BACKEND.vercel.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
